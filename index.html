<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0F172A" />
  <title>Calculadora LOX</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header class="header">
    <h1 class="title">Calculadora LOX</h1>
    <button class="toggle-theme" onclick="toggleDarkMode()">Modo</button>
  </header>

  <main class="container">

    <section class="card">
      <h2 class="section-title">Panel de operación</h2>

      <label>Isotanque</label>
      <select>
        <option>Isotanque 1</option>
        <option>Isotanque 2</option>
        <option>Isotanque 3</option>
        <option>Isotanque 4</option>
      </select>

      <div class="stock-box">
        <span class="stock-label">Stock isotanque seleccionado</span>
        <span class="stock-value">0.00 m³</span>
      </div>

      <div class="stock-board">
        Stock a bordo: <strong>15305.00 m³</strong>
      </div>

      <label>Centro</label>
      <input type="text" placeholder="Ej: C. Contao" />

    </section>

    <section class="card">
      <h2 class="section-title">Zona de operación</h2>

      <label>Nivel A (mmH₂O)</label>
      <input type="number" />

      <label>Nivel B (mmH₂O)</label>
      <input type="number" />

      <div class="total-descargado">
        Total descargado: —
      </div>

      <button class="primary">Registrar descarga por tramo</button>
      <button>Descargar isotanque completo</button>
    </section>

    <section class="card">
      <h2 class="section-title">Control e historial</h2>

      <button>Copiar historial</button>

      <div class="row-buttons">
        <button>Deshacer</button>
        <button>Nueva campaña</button>
      </div>

      <div class="historial">
        <p>02-03-2026 — C. Voigue — Isotanque 4 — completa — 16186.00 m³</p>
        <p>02-03-2026 — C. Aguantao — Isotanque 3 — completa — 16670.00 m³</p>
      </div>
    </section>

  </main>

  <script>
    function toggleDarkMode() {
      document.body.classList.toggle("dark-mode");
    }
  </script>

</body>
</html>
