<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Calculadora LOX</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="stiletto.css">
  <link rel="manifest" href="manifest.json">
</head>

<body>

<main class="layout">

  <img src="img/logo_transparent.png" class="logo" alt="Frasal">

  <section class="cardMain">

    <div class="stockRow">
      <span>Stock a bordo:</span>
      <strong id="saldoRestante">0.00 m³</strong>
    </div>

    <!-- Selector elegante -->
    <div class="isoSelector">
      <span id="isoTitulo" class="isoTitle">Isotanque 1</span>
      <span class="arrow">›</span>

      <!-- Select REAL superpuesto -->
      <select id="isotanqueSelect" class="isoOverlaySelect">
        <option value="1">Isotanque 1</option>
        <option value="2">Isotanque 2</option>
        <option value="3">Isotanque 3</option>
        <option value="4">Isotanque 4</option>
      </select>
    </div>

    <div class="isoValueBox">
      <div id="stockIsotanque" class="isoValue">
        0.00 m³
      </div>
      <div class="isoSub">
        Valor actual del isotanque
      </div>
    </div>

  </section>

  <section class="card">
    <h2>Zona de operación</h2>

    <label for="centro">Centro</label>
    <input id="centro" type="text" placeholder="Ej: C. Contao">

    <label for="nivelA">Nivel A (mmH₂O)</label>
    <input id="nivelA" type="number">
    <div id="m3A" class="equivalente">—</div>

    <label for="nivelB">Nivel B (mmH₂O)</label>
    <input id="nivelB" type="number">
    <div id="m3B" class="equivalente">—</div>

    <div id="resultado" class="resultado">
      Total descargado: —
    </div>

    <button id="registrar" class="btn">
      Registrar descarga por tramo
    </button>

    <button id="descargaCompleta" class="btn">
      Descargar isotanque completo
    </button>
  </section>

</main>

<script src="app.js"></script>
</body>
</html>
