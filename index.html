<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#F2F4F7" />
  <title>Calculadora LOX</title>

  <link rel="stylesheet" href="stiletto.css" />
</head>

<body>

<header class="header">
  <img src="img/frasal.png" alt="Frasal" class="logo">
  <h1 class="title">Calculadora LOX</h1>
  <button class="toggle-theme" onclick="toggleDarkMode()">Modo</button>
</header>

<main>

  <!-- PANEL DE OPERACIÓN -->
  <section class="card">
    <h2 class="section-title">Panel de operación</h2>

    <label>Isotanque</label>
    <select id="isotanque"></select>

    <div class="stock-label">Stock isotanque seleccionado</div>
    <div class="stock-value" id="stockSeleccionado">0.00 m³</div>

    <div class="stock-board">
      Stock a bordo: <strong id="stockTotal">0.00 m³</strong>
    </div>

    <label>Centro</label>
    <input type="text" id="centro" placeholder="Ej: C. Contao" />
  </section>

  <!-- ZONA DE OPERACIÓN -->
  <section class="card">
    <h2 class="section-title">Zona de operación</h2>

    <label>Nivel A (mmH₂O)</label>
    <input type="number" id="nivelA" />

    <label>Nivel B (mmH₂O)</label>
    <input type="number" id="nivelB" />

    <div class="total-descargado" id="totalDescargado">
      Total descargado: —
    </div>

    <button id="btnTramo">Registrar descarga por tramo</button>
    <button id="btnCompleto">Descargar isotanque completo</button>
  </section>

  <!-- CONFIGURAR CAMPAÑA -->
  <section class="card">
    <h2 class="section-title">Configurar campaña</h2>

    <div id="configCampania">
      <!-- Tu contenido original de campaña va aquí -->
    </div>
  </section>

  <!-- CONTROL E HISTORIAL -->
  <section class="card">
    <h2 class="section-title">Control e historial</h2>

    <button id="btnCopiar">Copiar historial</button>

    <div class="row-buttons">
      <button id="btnDeshacer">Deshacer</button>
      <button id="btnNueva">Nueva campaña</button>
    </div>

    <div class="historial" id="historial"></div>
  </section>

</main>

<script src="app.js"></script>

<script>
  function toggleDarkMode() {
    document.body.classList.toggle("dark-mode");

    const metaTheme = document.querySelector("meta[name=theme-color]");
    if (document.body.classList.contains("dark-mode")) {
      metaTheme.setAttribute("content", "#0F172A");
      localStorage.setItem("theme", "dark");
    } else {
      metaTheme.setAttribute("content", "#F2F4F7");
      localStorage.setItem("theme", "light");
    }
  }

  window.addEventListener("DOMContentLoaded", () => {
    const savedTheme = localStorage.getItem("theme");
    if (savedTheme === "dark") {
      document.body.classList.add("dark-mode");
    }
  });
</script>

</body>
</html>
